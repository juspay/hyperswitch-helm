apiVersion: v1
data:
  development.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080

    [secrets]
    tenant = "hyperswitch"
    
    {{- if ne .Values.backend "local" }}
    
    [secrets_management]
    {{ include "locker.secretsManagement" . | indent 4 }}
    {{- end }}
    
    {{- if eq (include "locker.tlsEnabled" .) "true" }}
    
    [tls]
    certificate = "{{ .Values.server.tls.certificate }}"
    private_key = "{{ .Values.server.tls.privateKey }}"
    {{- end }}
    
    {{- if eq .Values.server.externalKeyManager.mode "enabled_with_mtls" }}
    
    [external_key_manager]
    mode = "enabled_with_mtls"
    url = "{{ .Values.server.externalKeyManager.url }}"
    
    [api_client]
    client_idle_timeout = 90
    pool_max_idle_per_host = 10
    {{- else if eq .Values.server.externalKeyManager.mode "enabled" }}
    
    [external_key_manager]
    mode = "enabled"
    url = "{{ .Values.server.externalKeyManager.url }}"
    
    [api_client]
    client_idle_timeout = 90
    pool_max_idle_per_host = 10
    {{- else }}
    
    [external_key_manager]
    mode = "disabled"
    
    [api_client]
    client_idle_timeout = 90
    pool_max_idle_per_host = 10
    {{- end }}
kind: ConfigMap
metadata:
  name: hyperswitch-vault-config-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
